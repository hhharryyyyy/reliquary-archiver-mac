name: CI

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --locked --verbose --no-default-features --features pcap,stream
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: reliquary-archiver-macos
          path: target/debug/reliquary-archiver
