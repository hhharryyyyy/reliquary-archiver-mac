name: CI

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: moonrepo/setup-rust@v1
      - name: Build
        run: cargo build --locked --verbose --no-default-features --features pcap,stream
      - uses: actions/upload-artifact@v4
        with:
          name: reliquary-archiver-macos
          path: target/debug/reliquary-archiver
