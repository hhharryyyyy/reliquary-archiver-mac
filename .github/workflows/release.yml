name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.15.0-mac.1"
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build-release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: moonrepo/setup-rust@v1
      - name: Build
        run: cargo build --locked --release --no-default-features --features pcap,stream
      - name: Package
        run: |
          mkdir -p dist
          cp target/release/reliquary-archiver dist/reliquary-archiver
          cp scripts/install-macos-capture-permissions.sh dist/
          tar -czf reliquary-archiver-mac-${{ inputs.version }}.tar.gz -C dist .
      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ inputs.version }}
          name: v${{ inputs.version }}
          artifacts: reliquary-archiver-mac-${{ inputs.version }}.tar.gz
